<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>平和住宅情報センター アンケート集計ダッシュボード</title>
    <link rel="stylesheet" href="./styles.css?v=20260702-2" />
  </head>
  <body>
    <main class="dashboard-shell">
      <aside class="side">
        <div class="logo-card">
          <img src="./assets/heiwajuutaku-logo.jpg" alt="平和住宅情報センター" />
        </div>

        <div class="side-copy">
          <p class="eyebrow">SURVEY ANALYTICS</p>
          <h1>アンケート集計<br />ダッシュボード</h1>
          <p>Googleスプレッドシートに蓄積された回答を集計し、オーナーの意向を俯瞰する想定の提案用モックです。</p>
        </div>

        <nav class="survey-tabs" aria-label="集計対象">
          <button class="tab is-active" type="button" data-dashboard="existing">
            <span>既存オーナー</span>
            <strong>50周年アンケート</strong>
          </button>
          <button class="tab" type="button" data-dashboard="new">
            <span>新規受託</span>
            <strong>契約確認アンケート</strong>
          </button>
        </nav>

        <div class="sync-card">
          <span class="pulse" aria-hidden="true"></span>
          <div>
            <strong>Google Sheets連携想定</strong>
            <p>最終更新: <span id="updatedAt"></span></p>
          </div>
        </div>
      </aside>

      <section class="main">
        <header class="topbar">
          <div>
            <p id="dashboardKicker" class="eyebrow">OWNER SURVEY</p>
            <h2 id="dashboardTitle"></h2>
          </div>
          <div class="toolbar">
            <button class="tool-btn is-active" type="button">当月</button>
            <button class="tool-btn" type="button">四半期</button>
            <button class="tool-btn" type="button">全期間</button>
          </div>
        </header>

        <section id="kpiGrid" class="kpi-grid" aria-label="主要指標"></section>

        <section class="analytics-grid">
          <article class="panel large">
            <div class="panel-head">
              <div>
                <p class="panel-kicker">RESPONSE TREND</p>
                <h3>回答推移</h3>
              </div>
              <span id="trendNote" class="panel-note"></span>
            </div>
            <div id="trendChart" class="trend-chart"></div>
          </article>

          <article class="panel">
            <div class="panel-head">
              <div>
                <p class="panel-kicker">INTENT MIX</p>
                <h3 id="donutTitle"></h3>
              </div>
            </div>
            <div id="donutChart" class="donut-layout"></div>
          </article>

          <article class="panel">
            <div class="panel-head">
              <div>
                <p class="panel-kicker">TOP ANSWERS</p>
                <h3 id="barTitle"></h3>
              </div>
            </div>
            <div id="barChart" class="bar-list"></div>
          </article>

          <article class="panel">
            <div class="panel-head">
              <div>
                <p class="panel-kicker">ACTION SIGNALS</p>
                <h3 id="signalTitle"></h3>
              </div>
            </div>
            <div id="signalList" class="signal-list"></div>
          </article>

          <article class="panel large">
            <div class="panel-head">
              <div>
                <p class="panel-kicker">SEGMENT MAP</p>
                <h3 id="matrixTitle"></h3>
              </div>
              <span class="panel-note">濃いほど優先度高</span>
            </div>
            <div id="matrixChart" class="matrix"></div>
          </article>
        </section>

        <section class="respondent-workspace" aria-label="個別回答">
          <article class="panel respondent-list-panel">
            <div class="panel-head">
              <div>
                <p class="panel-kicker">INDIVIDUAL RESPONSES</p>
                <h3>回答者一覧</h3>
              </div>
              <span id="respondentCount" class="panel-note"></span>
            </div>
            <div id="respondentList" class="respondent-list"></div>
          </article>

          <article class="panel respondent-detail-panel">
            <div class="panel-head">
              <div>
                <p class="panel-kicker">RESPONSE DETAIL</p>
                <h3 id="respondentDetailTitle">回答詳細</h3>
              </div>
              <span id="respondentDetailMeta" class="panel-note"></span>
            </div>
            <div id="respondentDetail" class="respondent-detail"></div>
          </article>
        </section>
      </section>
    </main>

    <script src="./script.js?v=20260702-2"></script>
  </body>
</html>
