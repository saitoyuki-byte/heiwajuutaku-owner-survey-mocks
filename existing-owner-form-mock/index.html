<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>創業50周年記念 既存オーナーアンケート</title>
    <link rel="stylesheet" href="./styles.css?v=20260628-2" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="brand-panel" aria-label="平和住宅情報センター 既存オーナーアンケート">
        <div class="hero-image" aria-hidden="true"></div>
        <div class="brand-content">
          <div class="brand-row">
            <div class="brand-logo-card">
              <img src="./assets/heiwajuutaku-logo.jpg" alt="平和住宅情報センター" />
            </div>
            <p class="brand-sub">創業50周年記念オーナーアンケート</p>
          </div>

          <div class="title-block">
            <p class="eyebrow">OWNER SURVEY</p>
            <h1>既存オーナー様アンケート</h1>
            <p>
              これからの資産運用や管理方針を、より的確にサポートするためのご意向確認フォームです。
            </p>
          </div>

          <div class="reward-panel">
            <span class="reward-label">回答特典</span>
            <strong>QUOカード 3,000円分</strong>
            <span>ご回答いただいたオーナー様へ進呈</span>
          </div>

          <nav class="step-nav" aria-label="入力ステップ">
            <ol id="stepNav"></ol>
          </nav>
        </div>
      </aside>

      <main class="form-panel">
        <div class="topbar">
          <div>
            <p class="topbar-kicker" id="stepKicker">ご案内</p>
            <h2 id="stepTitle">オーナーアンケート実施についてのご案内</h2>
          </div>
          <div class="sync-pill" title="本番実装時はGoogleスプレッドシートに回答を蓄積します">
            <span aria-hidden="true"></span>
            Google Sheets連携想定
          </div>
        </div>

        <div class="progress-wrap" aria-label="回答進捗">
          <div class="progress-meta">
            <span id="progressText">1 / 12</span>
            <span id="saveState">未保存</span>
          </div>
          <div class="progress-track">
            <div id="progressBar" class="progress-bar"></div>
          </div>
        </div>

        <form id="surveyForm" novalidate>
          <section id="stepContent" class="step-content" aria-live="polite"></section>

          <div class="form-actions">
            <button class="icon-btn" id="backBtn" type="button" aria-label="前の設問へ" title="前へ">
              <span aria-hidden="true">‹</span>
            </button>
            <button class="secondary-btn" id="saveBtn" type="button">下書き保存</button>
            <button class="primary-btn" id="nextBtn" type="button">
              <span id="nextLabel">次へ</span>
              <span aria-hidden="true">›</span>
            </button>
          </div>
        </form>
      </main>
    </div>

    <div class="toast" id="toast" role="status" aria-live="polite"></div>

    <script src="./script.js?v=20260628-1"></script>
  </body>
</html>
